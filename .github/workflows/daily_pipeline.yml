name: daily hybrid ai jobs pipeline

on:
  schedule:
    - cron: '11 5 * * *'  # Moved to 5:11 AM UTC to avoid the global queue
  workflow_dispatch:      # Keeps your manual button
  push:                   # THE NEW TRIGGER
    branches:
      - main              # Only runs when you push to the main branch

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Create required directories
        run: mkdir -p data

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python core/main.py